<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI in Onderwijs - Interactief Werkboek</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Arial', sans-serif;
            background: #0a1a2b;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: #f5f5f5;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            overflow: hidden;
            border: 1px solid #c9a959;
        }

        header {
            background: linear-gradient(135deg, #0a1a2b 0%, #1a2c3e 100%);
            color: white;
            padding: 40px;
            text-align: center;
            border-bottom: 3px solid #c9a959;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #c9a959;
            font-weight: 500;
            letter-spacing: 1px;
        }

        header p {
            font-size: 1.2em;
            opacity: 0.9;
            color: #ffffff;
            font-weight: 300;
        }

        .user-section {
            background: #ffffff;
            padding: 20px 40px;
            border-bottom: 2px solid #c9a959;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .user-input {
            flex: 1;
            min-width: 250px;
        }

        .user-input label {
            display: block;
            margin-bottom: 5px;
            color: #0a1a2b;
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-input input {
            width: 100%;
            padding: 12px;
            border: 2px solid #c9a959;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .user-input input:focus {
            outline: none;
            border-color: #0a1a2b;
        }

        .user-button {
            background: #0a1a2b;
            color: #c9a959;
            border: 2px solid #c9a959;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .user-button:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .level-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 20px 40px;
            background: #e5e5e5;
            border-bottom: 2px solid #c9a959;
        }

        .level-btn {
            flex: 1;
            min-width: 60px;
            padding: 15px 10px;
            border: none;
            background: white;
            color: #0a1a2b;
            font-weight: 600;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border: 1px solid #c9a959;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(201, 169, 89, 0.3);
            background: #c9a959;
            color: #0a1a2b;
        }

        .level-btn.active {
            background: #0a1a2b;
            color: #c9a959;
            border: 1px solid #c9a959;
        }

        .content {
            display: flex;
            flex-wrap: wrap;
        }

        .theory-section {
            flex: 1.2;
            min-width: 400px;
            padding: 40px;
            background: #ffffff;
            border-right: 2px solid #c9a959;
        }

        .questions-section {
            flex: 1.8;
            min-width: 450px;
            padding: 40px;
            background: #f5f5f5;
        }

        .design-section {
            flex: 1.2;
            min-width: 400px;
            padding: 40px;
            background: #ffffff;
            border-left: 2px solid #c9a959;
        }

        .level-title {
            font-size: 2em;
            margin-bottom: 30px;
            color: #0a1a2b;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .level-badge {
            padding: 5px 15px;
            border-radius: 25px;
            font-size: 0.5em;
            font-weight: normal;
            background: #0a1a2b;
            color: #c9a959;
            border: 1px solid #c9a959;
        }

        .theory-dynamic {
            background: #ffffff;
            border-radius: 15px;
            padding: 0;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-left: 5px solid #c9a959;
            overflow: hidden;
            width: 100%;
        }

        .theory-header {
            background: #0a1a2b;
            color: #c9a959;
            padding: 15px 25px;
            font-size: 1.2em;
            font-weight: 600;
            border-bottom: 2px solid #c9a959;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .theory-content {
            padding: 25px;
        }

        .dynamic-text {
            max-height: 300px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #c9a959;
            line-height: 1.6;
            color: #333333;
            transition: max-height 0.3s ease;
            width: 100%;
            font-size: 1.05em;
        }

        .dynamic-text.expanded {
            max-height: 600px;
        }

        .dynamic-text p {
            margin-bottom: 15px;
        }

        .dynamic-text::-webkit-scrollbar {
            width: 10px;
        }

        .dynamic-text::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .dynamic-text::-webkit-scrollbar-thumb {
            background: #c9a959;
            border-radius: 10px;
        }

        .theory-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            justify-content: flex-end;
        }

        .theory-btn {
            background: #0a1a2b;
            color: #c9a959;
            border: 1px solid #c9a959;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .theory-btn:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .police-warning {
            background: #ffebee;
            border-left: 5px solid #d32f2f;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            color: #b71c1c;
            font-weight: 500;
            border: 1px solid #d32f2f;
        }

        .police-warning h4 {
            color: #d32f2f;
            margin-bottom: 10px;
            font-size: 1.1em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .police-warning ul {
            margin-left: 20px;
        }

        .police-warning li {
            margin-bottom: 8px;
        }

        .key-points {
            background: #f8f4e8;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #c9a959;
        }

        .key-points-title {
            font-weight: 700;
            color: #0a1a2b;
            margin-bottom: 15px;
            font-size: 1.1em;
            border-bottom: 1px solid #c9a959;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .key-points-list {
            list-style: none;
            padding: 0;
        }

        .key-points-list li {
            padding: 10px 0 10px 25px;
            position: relative;
            border-bottom: 1px solid rgba(201, 169, 89, 0.2);
            color: #333333;
        }

        .key-points-list li:last-child {
            border-bottom: none;
        }

        .key-points-list li:before {
            content: "—";
            position: absolute;
            left: 0;
            color: #c9a959;
            font-weight: bold;
        }

        .materials-section {
            margin-top: 30px;
            background: #ffffff;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #c9a959;
        }

        .materials-title {
            font-weight: 700;
            color: #0a1a2b;
            margin-bottom: 15px;
            font-size: 1.1em;
            border-bottom: 1px solid #c9a959;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .materials-list {
            list-style: none;
            padding: 0;
        }

        .materials-list li {
            margin-bottom: 12px;
            padding-left: 20px;
            position: relative;
        }

        .materials-list li:before {
            content: "→";
            position: absolute;
            left: 0;
            color: #c9a959;
            font-weight: bold;
        }

        .materials-list a {
            color: #0a1a2b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            word-break: break-all;
            border-bottom: 1px dotted transparent;
        }

        .materials-list a:hover {
            color: #c9a959;
            border-bottom: 1px dotted #c9a959;
        }

        .materials-list .pdf-link {
            background: #f8f4e8;
            padding: 5px 10px;
            border-radius: 5px;
            display: inline-block;
            border-left: 3px solid #c9a959;
            font-family: monospace;
        }

        .question-item {
            background: white;
            border: 2px solid #c9a959;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .question-item:hover {
            border-color: #0a1a2b;
            box-shadow: 0 5px 20px rgba(10, 26, 43, 0.1);
        }

        .question-number {
            font-size: 1.2em;
            font-weight: 700;
            color: #0a1a2b;
            margin-bottom: 10px;
            border-bottom: 1px solid #c9a959;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .question-text {
            font-size: 1.1em;
            color: #333333;
            margin-bottom: 15px;
            line-height: 1.6;
        }

        .answer-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #c9a959;
            border-radius: 8px;
            font-size: 1em;
            margin: 10px 0;
            resize: vertical;
            background: #f8f9fa;
            font-family: inherit;
        }

        .answer-input:focus {
            outline: none;
            border-color: #0a1a2b;
        }

        .save-btn {
            background: #0a1a2b;
            color: #c9a959;
            border: 2px solid #c9a959;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .save-btn:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .mindmap-editor {
            background: #ffffff;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border: 1px solid #c9a959;
        }

        .mindmap-tools {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
            padding-bottom: 10px;
            border-bottom: 1px solid #c9a959;
        }

        .mindmap-tool-btn {
            background: #f0f0f0;
            border: 1px solid #c9a959;
            color: #0a1a2b;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mindmap-tool-btn:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .mindmap-canvas {
            min-height: 250px;
            background: #f8f9fa;
            border: 1px dashed #c9a959;
            border-radius: 6px;
            padding: 15px;
            position: relative;
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .central-concept {
            width: 100px;
            height: 100px;
            background: #0a1a2b;
            border: 2px solid #c9a959;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .central-concept-input {
            width: 80px;
            padding: 4px;
            background: white;
            border: 1px solid #c9a959;
            border-radius: 12px;
            text-align: center;
            font-weight: bold;
            color: #0a1a2b;
            margin-top: 3px;
            font-size: 0.7em;
            font-family: inherit;
        }

        .central-concept-input:focus {
            outline: none;
            border-color: #0a1a2b;
        }

        .central-label {
            color: #c9a959;
            font-size: 0.6em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .arrow-down {
            width: 1px;
            height: 15px;
            background: #c9a959;
            position: relative;
            margin: 5px 0;
        }

        .arrow-down:after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: -4px;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid #c9a959;
        }

        .nodes-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            position: relative;
            margin-top: 10px;
        }

        .node-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .node-arrow {
            width: 1px;
            height: 12px;
            background: #c9a959;
            margin-bottom: 5px;
            position: relative;
        }

        .node-arrow:after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: -4px;
            width: 0;
            height: 0;
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-top: 6px solid #c9a959;
        }

        .node-rectangle {
            width: 120px;
            background: white;
            border: 2px solid #c9a959;
            border-radius: 6px;
            padding: 10px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .node-rectangle:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(201, 169, 89, 0.3);
        }

        .node-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            padding-bottom: 3px;
            border-bottom: 1px solid #c9a959;
        }

        .node-label {
            font-weight: bold;
            color: #0a1a2b;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .node-delete {
            background: none;
            border: none;
            color: #c9a959;
            font-size: 1em;
            cursor: pointer;
            padding: 0 3px;
            font-weight: bold;
        }

        .node-delete:hover {
            color: #dc3545;
        }

        .node-textarea {
            width: 100%;
            padding: 4px;
            border: 1px solid #c9a959;
            border-radius: 4px;
            font-size: 0.7em;
            resize: vertical;
            min-height: 40px;
            background: #f8f9fa;
            font-family: inherit;
        }

        .node-textarea:focus {
            outline: none;
            border-color: #0a1a2b;
        }

        .add-node-btn {
            background: #0a1a2b;
            color: #c9a959;
            border: 2px solid #c9a959;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            margin-top: 10px;
            align-self: center;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .add-node-btn:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .mindmap-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 10px;
        }

        .design-box {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            border: 1px solid #c9a959;
        }

        .design-title {
            font-size: 1.3em;
            color: #0a1a2b;
            margin-bottom: 15px;
            font-weight: bold;
            border-bottom: 1px solid #c9a959;
            padding-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .design-description {
            color: #333333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .results-section {
            padding: 40px;
            background: #e5e5e5;
            border-top: 3px solid #c9a959;
        }

        .results-title {
            font-size: 1.8em;
            color: #0a1a2b;
            margin-bottom: 20px;
            border-bottom: 2px solid #c9a959;
            padding-bottom: 10px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .results-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px;
            border: 2px solid #c9a959;
            border-radius: 8px;
            font-size: 1em;
            min-width: 200px;
            background: white;
            color: #0a1a2b;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select:focus {
            outline: none;
            border-color: #0a1a2b;
        }

        .results-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .results-action-btn {
            background: #0a1a2b;
            color: #c9a959;
            border: 2px solid #c9a959;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9em;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .results-action-btn:hover {
            background: #c9a959;
            color: #0a1a2b;
        }

        .results-action-btn.danger {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }

        .results-action-btn.danger:hover {
            background: #bd2130;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .result-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            border-left: 4px solid #c9a959;
            position: relative;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #c9a959;
        }

        .result-name {
            font-weight: bold;
            color: #0a1a2b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-level {
            background: #0a1a2b;
            color: #c9a959;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            border: 1px solid #c9a959;
            margin: 0 5px;
        }

        .delete-result-btn {
            background: none;
            border: 2px solid #dc3545;
            color: #dc3545;
            font-size: 1.2em;
            font-weight: bold;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-left: 5px;
        }

        .delete-result-btn:hover {
            background: #dc3545;
            color: white;
        }

        .result-type-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .question-badge {
            background: #0a1a2b;
            color: #c9a959;
            border: 1px solid #c9a959;
        }
        
        .design-badge {
            background: #c9a959;
            color: #0a1a2b;
            border: 1px solid #0a1a2b;
        }
        
        .answer-card {
            border-left: 4px solid #0a1a2b;
        }
        
        .design-card {
            border-left: 4px solid #c9a959;
        }
        
        .result-question {
            color: #333333;
            margin-bottom: 10px;
        }

        .result-answer {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            color: #333333;
            border: 1px solid #c9a959;
            max-height: 150px;
            overflow-y: auto;
        }

        .status-message {
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .design-content-preview {
            position: relative;
        }
        
        .expand-btn {
            background: none;
            border: 2px solid #c9a959;
            color: #0a1a2b;
            cursor: pointer;
            padding: 5px 10px;
            margin-left: 5px;
            border-radius: 5px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .expand-btn:hover {
            background: #c9a959;
            color: #0a1a2b;

        // Mindmap functies
        let nodeCount = 0;

        function addMindmapNode() {
            const container = document.getElementById('nodesContainer');
            if (!container) return;
            
            nodeCount++;
            const nodeId = `node_${nodeCount}`;
            
            const nodeHTML = `
                <div class="node-item" id="${nodeId}">
                    <div class="node-arrow"></div>
                    <div class="node-rectangle">
                        <div class="node-header">
                            <span class="node-label">Cat. ${nodeCount}</span>
                            <button class="node-delete" onclick="deleteMindmapNode('${nodeId}')">×</button>
                        </div>
                        <textarea class="node-textarea" 
                            placeholder="Beschrijf..."></textarea>
                    </div>
                </div>
            `;
            
            container.insertAdjacentHTML('beforeend', nodeHTML);
        }

        function deleteMindmapNode(nodeId) {
            const node = document.getElementById(nodeId);
            if (node) {
                node.remove();
            }
        }

        function saveMindmap() {
            const centralConcept = document.getElementById('centralConcept')?.value || 'AI in onderwijs';
            
            const nodes = [];
            const nodeElements = document.querySelectorAll('.node-item');
            
            nodeElements.forEach((node, index) => {
                const textarea = node.querySelector('.node-textarea');
                const label = node.querySelector('.node-label');
                nodes.push({
                    id: node.id,
                    label: label ? label.innerText : `Categorie ${index + 1}`,
                    content: textarea ? textarea.value : ''
                });
            });
            
            const mindmapData = {
                centralConcept: centralConcept,
                nodes: nodes,
                timestamp: new Date().toISOString()
            };
            
            // Sla op in localStorage
            localStorage.setItem(`${currentUser}_mindmap`, JSON.stringify(mindmapData));
            
            // Sla ook op als design voor niveau 0
            localStorage.setItem(`${currentUser}_design_0`, JSON.stringify(mindmapData));
            
            // Sla op in Firebase
            if (database) {
                const designData = {
                    userId: currentUser,
                    level: 0,
                    design: JSON.stringify(mindmapData),
                    timestamp: new Date().toISOString()
                };
                
                database.ref('designs/' + currentUser + '_0').set(designData)
                    .then(() => {
                        showStatus('status-design-0', 'Mindmap opgeslagen in database!', 'success');
                        loadResults();
                    })
                    .catch(error => {
                        console.error('Firebase error:', error);
                        showStatus('status-design-0', 'Fout bij opslaan in database, maar lokaal opgeslagen', 'error');
                    });
            } else {
                showStatus('status-design-0', 'Mindmap lokaal opgeslagen', 'success');
            }
            
            alert('Mindmap opgeslagen!');
        }

        function loadMindmap() {
            const savedMindmap = localStorage.getItem(`${currentUser}_mindmap`);
            if (!savedMindmap) return;
            
            try {
                const mindmapData = JSON.parse(savedMindmap);
                
                // Centraal concept
                const centralInput = document.getElementById('centralConcept');
                if (centralInput) {
                    centralInput.value = mindmapData.centralConcept || 'AI in onderwijs';
                }
                
                // Verwijder bestaande nodes
                const container = document.getElementById('nodesContainer');
                if (container) {
                    container.innerHTML = '';
                    
                    // Voeg opgeslagen nodes toe
                    if (mindmapData.nodes && mindmapData.nodes.length > 0) {
                        nodeCount = 0;
                        mindmapData.nodes.forEach(node => {
                            nodeCount++;
                            const nodeId = `node_${nodeCount}`;
                            
                            const nodeHTML = `
                                <div class="node-item" id="${nodeId}">
                                    <div class="node-arrow"></div>
                                    <div class="node-rectangle">
                                        <div class="node-header">
                                            <span class="node-label">${node.label || `Cat. ${nodeCount}`}</span>
                                            <button class="node-delete" onclick="deleteMindmapNode('${nodeId}')">×</button>
                                        </div>
                                        <textarea class="node-textarea" 
                                            placeholder="Beschrijf...">${node.content || ''}</textarea>
                                    </div>
                                </div>
                            `;
                            
                            container.insertAdjacentHTML('beforeend', nodeHTML);
                        });
                    }
                }
            } catch (e) {
                console.error('Fout bij laden mindmap:', e);
            }
        }

            if (textElement) {
                if (textElement.style.maxHeight === '600px') {
                    textElement.style.maxHeight = '300px';
                } else {
                    textElement.style.maxHeight = '600px';
                }
            }
        }

        function resetTheoryScroll() {
            const textElement = document.getElementById('dynamicTheoryText');
            if (textElement) {
                textElement.scrollTop = 0;
            }
        }

        function saveAnswer(level, questionIndex) {
            const input = document.getElementById(`input-${level}-${questionIndex}`);
            const answer = input.value;
            const questionId = `q${level}_${questionIndex}`;
            
            localStorage.setItem(`${currentUser}_${questionId}`, answer);
            
            if (database) {
                const answerData = {
                    userId: currentUser,
                    level: level,
                    questionIndex: questionIndex,
                    answer: answer,
                    timestamp: new Date().toISOString()
                };
                
                database.ref('answers/' + currentUser + '_' + questionId).set(answerData)
                    .then(() => {
                        showStatus(`status-${level}-${questionIndex}`, 'Antwoord opgeslagen in database!', 'success');
                        loadResults();
                    })
                    .catch(error => {
                        console.error('Firebase error:', error);
                        showStatus(`status-${level}-${questionIndex}`, 'Fout bij opslaan in database, maar lokaal opgeslagen', 'error');
                    });
            } else {
                showStatus(`status-${level}-${questionIndex}`, 'Antwoord lokaal opgeslagen (geen database)', 'success');
            }
        }

            if (!input) return;
            
            const design = input.value;

                const designData = {
                    userId: currentUser,

                    design: design,
                    timestamp: new Date().toISOString()
                };
                
                database.ref('designs/' + currentUser + '_' + level).set(designData)

                        showStatus(`status-design-${level}`, 'Ontwerp opgeslagen in database!', 'success');
                        loadResults();
                    })

                showStatus(`status-design-${level}`, 'Ontwerp lokaal opgeslagen (geen database)', 'success');

        function showStatus(elementId, message, type) {
            const statusEl = document.getElementById(elementId);
            if (!statusEl) return;
            
            statusEl.textContent = message;
            statusEl.className = `status-message status-${type}`;
            statusEl.style.display = 'block';
            
            setTimeout(() => {
                statusEl.style.display = 'none';
            }, 3000);
        }

        function updateUser() {
            const newUser = document.getElementById('userName').value.trim();
            if (newUser) {
                currentUser = newUser;
                localStorage.setItem('currentUser', currentUser);
                renderLevel(currentLevel);
                updateUserFilter();
                loadResults();
                alert(`Gebruiker gewijzigd naar: ${currentUser}`);
            }
        }

        function updateUserFilter() {
            const filterUser = document.getElementById('filterUser');
            if (!database) return;
            
            database.ref('answers').once('value', (snapshot) => {
                const answers = snapshot.val() || {};
                const users = new Set();
                
                Object.values(answers).forEach(answer => {
                    if (answer.userId) users.add(answer.userId);
                });
                
                filterUser.innerHTML = '<option value="all">Alle deelnemers</option>';
                users.forEach(user => {
                    filterUser.innerHTML += `<option value="${user}">${user}</option>`;
                });
            });
        }

        function loadResults() {
            const resultsGrid = document.getElementById('resultsGrid');
            const filterLevel = document.getElementById('filterLevel').value;
            const filterUser = document.getElementById('filterUser').value;
            
            if (!database) {
                resultsGrid.innerHTML = '<p>Database niet verbonden. Toon lokale resultaten...</p>';
                loadLocalResults();
                return;
            }
            
            Promise.all([
                database.ref('answers').once('value'),
                database.ref('designs').once('value')
            ]).then(([answersSnapshot, designsSnapshot]) => {
                const answers = answersSnapshot.val() || {};
                const designs = designsSnapshot.val() || {};
                
                let allResults = [];
                
                Object.values(answers).forEach(answer => {
                    allResults.push({
                        type: 'answer',
                        userId: answer.userId,
                        level: answer.level,
                        questionIndex: answer.questionIndex,
                        questionText: levels[answer.level]?.questions[answer.questionIndex] || 'Vraag niet gevonden',
                        content: answer.answer,
                        timestamp: answer.timestamp,
                        levelName: levels[answer.level]?.name || 'Onbekend',
                        key: answer.userId + '_q' + answer.level + '_' + answer.questionIndex
                    });
                });
                
                Object.values(designs).forEach(design => {
                    allResults.push({
                        type: 'design',
                        userId: design.userId,
                        level: design.level,
                        designTitle: levels[design.level]?.designTask.title || 'Ontwerpopdracht',
                        content: design.design,
                        timestamp: design.timestamp,
                        levelName: levels[design.level]?.name || 'Onbekend',
                        key: design.userId + '_design_' + design.level
                    });
                });
                
                if (filterLevel !== 'all') {
                    allResults = allResults.filter(r => r.level == filterLevel);
                }
                if (filterUser !== 'all') {
                    allResults = allResults.filter(r => r.userId === filterUser);
                }
                
                allResults.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                if (allResults.length === 0) {
                    resultsGrid.innerHTML = '<p>Nog geen resultaten voor deze filters.</p>';
                    return;
                }
                
                resultsGrid.innerHTML = allResults.map(result => {
                    if (result.type === 'answer') {
                        return `
                            <div class="result-card answer-card" id="result-${result.key}">
                                <div class="result-header">
                                    <span class="result-name">${result.userId}</span>
                                    <span class="result-level">Niveau ${result.level}: ${result.levelName}</span>
                                    <button class="delete-result-btn" onclick="deleteResult('${result.key}', 'answer', ${result.level}, ${result.questionIndex})" title="Verwijder dit antwoord">×</button>
                                </div>
                                <div class="result-type-badge question-badge">Vraag ${result.questionIndex + 1}</div>
                                <div class="result-question">
                                    <strong>Vraag:</strong><br>
                                    ${result.questionText}
                                </div>
                                <div class="result-answer">
                                    <strong>Antwoord:</strong><br>
                                    ${result.content || 'Geen antwoord'}
                                </div>
                                <small style="color: #666; display: block; margin-top: 10px;">
                                    ${new Date(result.timestamp).toLocaleString()}
                                </small>
                            </div>
                        `;
                    } else {
                        // Probeer mindmap data te formatteren als het niveau 0 is
                        let displayContent = result.content;
                        if (result.level === 0 && result.content) {
                            try {
                                const mindmapData = JSON.parse(result.content);
                                displayContent = `Centraal concept: ${mindmapData.centralConcept}\nAantal categorieën: ${mindmapData.nodes?.length || 0}`;
                            } catch (e) {
                                // Geen geldige JSON, toon zoals het is
                            }
                        }
                        
                        return `
                            <div class="result-card design-card" id="result-${result.key}">
                                <div class="result-header">
                                    <span class="result-name">${result.userId}</span>
                                    <span class="result-level">Niveau ${result.level}: ${result.levelName}</span>
                                    <button class="delete-result-btn" onclick="deleteResult('${result.key}', 'design', ${result.level})" title="Verwijder dit ontwerp">×</button>
                                </div>
                                <div class="result-type-badge design-badge">Ontwerpproduct</div>
                                <div class="result-question">
                                    <strong>${result.designTitle}</strong>
                                </div>
                                <div class="result-answer">
                                    <strong>Uitwerking:</strong><br>
                                    ${formatDesignContent(displayContent)}
                                </div>
                                <small style="color: #666; display: block; margin-top: 10px;">
                                    ${new Date(result.timestamp).toLocaleString()}
                                </small>
                            </div>
                        `;
                    }
                }).join('');
                
                addResultsSummary(allResults);
                
            }).catch(error => {
                console.error('Error loading results:', error);
                resultsGrid.innerHTML = '<p>Fout bij laden van resultaten</p>';
            });
        }

        function formatDesignContent(content) {
            if (!content) return 'Geen uitwerking';
            if (content.length > 200) {
                const shortContent = content.substring(0, 200) + '...';
                return `
                    <div class="design-content-preview">
                        ${shortContent}
                        <button class="expand-btn" onclick="expandDesign(this)" data-fullcontent="${encodeURIComponent(content)}">Lees meer</button>
                    </div>
                    <div class="design-content-full" style="display:none;">${content}</div>
                `;
            }
            return content;
        }

        function expandDesign(btn) {
            const fullContent = decodeURIComponent(btn.dataset.fullcontent);
            const preview = btn.closest('.design-content-preview');
            preview.style.display = 'none';
            const full = btn.closest('.result-card').querySelector('.design-content-full');
            full.style.display = 'block';
        }

        function addResultsSummary(results) {
            const summary = {};
            results.forEach(result => {
                if (!summary[result.userId]) {
                    summary[result.userId] = {
                        answers: {},
                        designs: {}
                    };
                }
                
                if (result.type === 'answer') {
                    if (!summary[result.userId].answers[result.level]) {
                        summary[result.userId].answers[result.level] = [];
                    }
                    summary[result.userId].answers[result.level].push(result.questionIndex);
                } else {
                    summary[result.userId].designs[result.level] = true;
                }
            });
            
            const summaryHTML = `
                <div class="results-summary">
                    <h3>Samenvatting per deelnemer</h3>
                    <div class="summary-grid">
                        ${Object.entries(summary).map(([user, data]) => `
                            <div class="summary-item">
                                <strong>${user}</strong><br>
                                <span class="summary-answers">
                                    Vragen beantwoord: 
                                    ${Object.entries(data.answers).map(([level, questions]) => 
                                        `niv.${level} (${questions.length}/5)`
                                    ).join(', ') || 'Geen'}
                                </span><br>
                                <span class="summary-designs">
                                    Ontwerpen: 
                                    ${Object.keys(data.designs).map(level => 
                                        `niv.${level}`
                                    ).join(', ') || 'Geen'}
                                </span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            const resultsSection = document.querySelector('.results-section');
            const existingSummary = resultsSection.querySelector('.results-summary');
            if (existingSummary) {
                existingSummary.remove();
            }
            resultsSection.insertAdjacentHTML('afterbegin', summaryHTML);
        }

        // Functie om een specifiek resultaat te verwijderen
        function deleteResult(key, type, level, questionIndex = null) {
            if (!confirm('Weet je zeker dat je dit resultaat wilt verwijderen?')) {
                return;
            }
            
            // Verwijder uit Firebase
            if (database) {
                if (type === 'answer') {
                    database.ref('answers/' + key).remove()
                        .then(() => {
                            // Verwijder ook uit localStorage
                            localStorage.removeItem(key);
                            showStatusMessage('Resultaat verwijderd!', 'success');
                            loadResults(); // Herlaad de resultaten
                        })
                        .catch(error => {
                            console.error('Fout bij verwijderen:', error);
                            showStatusMessage('Fout bij verwijderen', 'error');
                        });
                } else {
                    database.ref('designs/' + key).remove()
                        .then(() => {
                            localStorage.removeItem(key);
                            showStatusMessage('Ontwerp verwijderd!', 'success');
                            loadResults();
                        })
                        .catch(error => {
                            console.error('Fout bij verwijderen:', error);
                            showStatusMessage('Fout bij verwijderen', 'error');
                        });
                }
            }
        }

        // Functie om alle resultaten te resetten
        function resetAllResults() {
            if (!confirm('WEES VOORZICHTIG: Dit verwijdert ALLE resultaten uit de database. Exporteer eerst naar PDF als je ze wilt bewaren. Weet je het zeker?')) {
                return;
            }
            
            if (!database) return;
            
            // Verwijder alle answers en designs
            Promise.all([
                database.ref('answers').remove(),
                database.ref('designs').remove()
            ]).then(() => {
                // Verwijder ook alle gerelateerde items uit localStorage
                const keysToRemove = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (key.includes('_q') || key.includes('_design') || key.includes('_mindmap')) {
                        keysToRemove.push(key);
                    }
                }
                keysToRemove.forEach(key => localStorage.removeItem(key));
                
                showStatusMessage('Alle resultaten zijn gewist!', 'success');
                loadResults(); // Herlaad de lege resultaten
            }).catch(error => {
                console.error('Fout bij resetten:', error);
                showStatusMessage('Fout bij resetten', 'error');
            });
        }

        // Hulpfunctie voor statusmeldingen
        function showStatusMessage(message, type) {
            const statusDiv = document.createElement('div');
            statusDiv.className = `status-message status-${type}`;
            statusDiv.style.display = 'block';
            statusDiv.textContent = message;
            statusDiv.style.position = 'fixed';
            statusDiv.style.top = '20px';
            statusDiv.style.right = '20px';
            statusDiv.style.zIndex = '1000';
            document.body.appendChild(statusDiv);
            
            setTimeout(() => {
                statusDiv.remove();
            }, 3000);
        }

        // PDF Export functie
        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(18);
            doc.text('AI in Onderwijs - Resultatenoverzicht', 14, 22);
            doc.setFontSize(11);
            doc.text(`Exportdatum: ${new Date().toLocaleString()}`, 14, 32);
            
            let yPos = 45;
            
            // Haal alle resultaten op uit de huidige weergave
            const resultCards = document.querySelectorAll('.result-card');
            
            if (resultCards.length === 0) {
                doc.text('Geen resultaten om te exporteren.', 14, yPos);
            } else {
                resultCards.forEach((card, index) => {
                    const name = card.querySelector('.result-name')?.textContent || 'Onbekend';
                    const level = card.querySelector('.result-level')?.textContent || 'Onbekend';
                    const type = card.querySelector('.result-type-badge')?.textContent || 'Onbekend';
                    const question = card.querySelector('.result-question')?.textContent || '';
                    const answer = card.querySelector('.result-answer')?.textContent || '';
                    
                    doc.setFontSize(12);
                    doc.setFont(undefined, 'bold');
                    doc.text(`${index + 1}. ${name} - ${level}`, 14, yPos);
                    yPos += 6;
                    
                    doc.setFont(undefined, 'normal');
                    doc.setFontSize(10);
                    
                    // Split lange tekst voor PDF
                    const questionLines = doc.splitTextToSize(`Vraag: ${question}`, 180);
                    questionLines.forEach(line => {
                        if (yPos > 270) {
                            doc.addPage();
                            yPos = 20;
                        }
                        doc.text(line, 14, yPos);
                        yPos += 5;
                    });
                    
                    const answerLines = doc.splitTextToSize(`Antwoord: ${answer}`, 180);
                    answerLines.forEach(line => {
                        if (yPos > 270) {
                            doc.addPage();
                            yPos = 20;
                        }
                        doc.text(line, 14, yPos);
                        yPos += 5;
                    });
                    
                    yPos += 5;
                    
                    // Nieuwe pagina indien nodig
                    if (yPos > 270 && index < resultCards.length - 1) {
                        doc.addPage();
                        yPos = 20;
                    }
                });
            }
            
            // Sla PDF op
            doc.save(`AI-resultaten-${new Date().toISOString().slice(0,10)}.pdf`);
            
            showStatusMessage('PDF gedownload!', 'success');
        }

        function loadLocalResults() {
            const resultsGrid = document.getElementById('resultsGrid');
            const localResults = [];
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                
                if (key.includes('_q')) {
                    const parts = key.split('_');
                    const user = parts[0];
                    const levelQuestion = parts[1];
                    const level = levelQuestion.substring(1, 2);
                    const questionIndex = levelQuestion.substring(3);
                    
                    localResults.push({
                        type: 'answer',
                        user: user,
                        level: level,
                        questionIndex: questionIndex,
                        content: localStorage.getItem(key),
                        key: key
                    });
                } else if (key.includes('_design_') || key.includes('_mindmap')) {
                    const parts = key.split('_');
                    const user = parts[0];
                    const level = key.includes('mindmap') ? '0' : parts[2];
                    
                    localResults.push({
                        type: 'design',
                        user: user,
                        level: level,
                        content: localStorage.getItem(key),
                        key: key
                    });
                }
            }
            
            if (localResults.length === 0) {
                resultsGrid.innerHTML = '<p>Nog geen lokale resultaten.</p>';
                return;
            }
            
            resultsGrid.innerHTML = localResults.map(result => {
                if (result.type === 'answer') {
                    return `
                        <div class="result-card answer-card">
                            <div class="result-header">
                                <span class="result-name">${result.user}</span>
                                <span class="result-level">Niveau ${result.level}</span>
                                <button class="delete-result-btn" onclick="deleteLocalResult('${result.key}')" title="Verwijder dit antwoord">×</button>
                            </div>
                            <div class="result-type-badge question-badge">Vraag ${parseInt(result.questionIndex) + 1}</div>
                            <div class="result-answer">
                                <strong>Lokaal antwoord:</strong><br>
                                ${result.content.substring(0, 150)}${result.content.length > 150 ? '...' : ''}
                            </div>
                        </div>
                    `;
                } else {
                    return `
                        <div class="result-card design-card">
                            <div class="result-header">
                                <span class="result-name">${result.user}</span>
                                <span class="result-level">Niveau ${result.level}</span>
                                <button class="delete-result-btn" onclick="deleteLocalResult('${result.key}')" title="Verwijder dit ontwerp">×</button>
                            </div>
                            <div class="result-type-badge design-badge">Lokaal ontwerp</div>
                            <div class="result-answer">
                                <strong>Ontwerp (lokaal):</strong><br>
                                ${result.content.substring(0, 150)}${result.content.length > 150 ? '...' : ''}
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        function deleteLocalResult(key) {
            if (!confirm('Weet je zeker dat je dit lokale resultaat wilt verwijderen?')) return;
            localStorage.removeItem(key);
            loadLocalResults();
        }
    </script>
</body>
</html>
